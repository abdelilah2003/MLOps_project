services:

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.1.4
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"

  dtrack-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dtrack
      POSTGRES_USER: dtrack
      POSTGRES_PASSWORD: dtrack
    volumes:
      - dtrack-postgres-data:/var/lib/postgresql/data

  dependency-track-apiserver:
    image: dependencytrack/apiserver:4.12.2
    depends_on:
      - dtrack-postgres
    environment:
      ALPINE_DATABASE_MODE: external
      ALPINE_DATABASE_DRIVER: org.postgresql.Driver
      ALPINE_DATABASE_URL: jdbc:postgresql://dtrack-postgres:5432/dtrack
      ALPINE_DATABASE_USERNAME: dtrack
      ALPINE_DATABASE_PASSWORD: dtrack
    ports:
      - "8081:8080"
    volumes:
      - dtrack-data:/data

  dependency-track-frontend:
    image: dependencytrack/frontend:4.12.2
    depends_on:
      - dependency-track-apiserver
    environment:
      API_BASE_URL: http://localhost:8081
    ports:
      - "8082:8080"

volumes:
  dtrack-postgres-data:
  dtrack-data:
  grafana-data:
