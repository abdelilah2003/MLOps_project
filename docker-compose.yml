version: '3.9'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=/app/models/model.joblib
    volumes:
      - ./models:/app/models

  dtrack-postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=dtrack
      - POSTGRES_USER=dtrack
      - POSTGRES_PASSWORD=dtrack
    volumes:
      - dtrack-postgres-data:/var/lib/postgresql/data

  dependency-track-apiserver:
    image: dependencytrack/apiserver:4.12.2
    depends_on:
      - dtrack-postgres
    environment:
      - ALPINE_DATABASE_MODE=external
      - ALPINE_DATABASE_DRIVER=org.postgresql.Driver
      - ALPINE_DATABASE_URL=jdbc:postgresql://dtrack-postgres:5432/dtrack
      - ALPINE_DATABASE_USERNAME=dtrack
      - ALPINE_DATABASE_PASSWORD=dtrack
    ports:
      - "8081:8080"
    volumes:
      - dtrack-data:/data

  dependency-track-frontend:
    image: dependencytrack/frontend:4.12.2
    depends_on:
      - dependency-track-apiserver
    environment:
      - API_BASE_URL=http://localhost:8081
    ports:
      - "8082:8080"

volumes:
  dtrack-postgres-data:
  dtrack-data:
