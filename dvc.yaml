stages:

  prepare_data:
    cmd: python -m prompt_firewall.data
    deps:
      - src/prompt_firewall/data.py
      - data/raw/prompts.csv
    outs:
      - data/processed/prompts.csv

  train:
    cmd: python -m prompt_firewall.train
    deps:
      - src/prompt_firewall/train.py
      - data/processed/prompts.csv
    outs:
      - artifacts/model.pkl
    metrics:
      - artifacts/metrics.json

  monitor:
    cmd: python -m prompt_firewall.monitor
    deps:
      - src/prompt_firewall/monitor.py
      - data/processed/prompts.csv