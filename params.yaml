data:
  raw_path: data/raw/prompts.csv
  processed_path: data/processed/prompts_clean.csv

training:
  random_state: 42
  test_size: 0.2
  max_features: 5000
  c_value: 1.0

model:
  path: models/model.joblib
  metrics_path: reports/metrics.json

mlflow:
  tracking_uri: file:./mlruns
  experiment_name: prompt-firewall

monitoring:
  reference_data_path: data/processed/prompts_clean.csv
  current_data_path: data/processed/prompts_clean.csv
  report_path: reports/evidently_report.html
